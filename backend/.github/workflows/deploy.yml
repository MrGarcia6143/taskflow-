name: Deploy to Render

on:
  push:
    branches:
      - main   # Se ejecuta cada vez que haces push a main

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: ./backend
        run: npm ci

      - name: Verificar que el servidor arranca
        working-directory: ./backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PORT: 3000
        run: |
          timeout 8 node src/index.js &
          sleep 4
          curl --fail http://localhost:3000/health || exit 1
          echo "✅ Health check pasado"

      - name: Notificar deploy a Render
        # Render detecta el push a main automáticamente.
        # Este paso es opcional pero confirma el éxito del pipeline.
        run: echo "🚀 Pipeline completado — Render desplegará la rama main"
